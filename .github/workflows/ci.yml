name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install black ruff pytest
        pip install -r requirements.txt
    
    - name: Run black
      run: black --check src/ demo/ tests/
    
    - name: Run ruff
      run: ruff check src/ demo/ tests/
    
    - name: Run type checking
      run: |
        pip install mypy
        mypy src/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11']
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        pytest tests/ -v --cov=src --cov-report=xml
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella

  model-export:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Train and export model
      run: |
        python src/models/parking_classifier.py
        python -c "
        import torch
        from src.models.parking_classifier import ParkingSpaceClassifier
        from src.export.deployment import DeploymentPipeline
        from pathlib import Path
        
        # Create model
        model = ParkingSpaceClassifier(input_dim=4, hidden_dims=[32, 16])
        
        # Deploy to test device
        pipeline = DeploymentPipeline('raspberry_pi_4', Path('test_deployments'))
        deployment_info = pipeline.deploy_model(model, input_shape=(4,))
        print('Deployment successful:', deployment_info)
        "
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: exported-models
        path: test_deployments/

  demo-test:
    runs-on: ubuntu-latest
    needs: [lint, test]
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Test Streamlit app
      run: |
        python -c "
        import streamlit as st
        import sys
        sys.path.append('demo')
        
        # Test that the demo can be imported
        from app import ParkingSpaceDemo
        demo = ParkingSpaceDemo()
        print('Demo import successful')
        "
    
    - name: Run Streamlit test
      run: |
        timeout 30s streamlit run demo/app.py --server.headless true --server.port 8501 &
        sleep 10
        curl -f http://localhost:8501 || exit 1
        echo "Streamlit app is running successfully"

  security:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Run security scan
      uses: bandit-action/bandit-action@master
      with:
        path: src/
        level: medium
        confidence: medium
    
    - name: Check for secrets
      uses: trufflesecurity/trufflehog@main
      with:
        path: ./
        base: main
        head: HEAD
        extra_args: --debug --only-verified
