# Device configurations for different edge platforms

# Raspberry Pi 4 Configuration
raspberry_pi_4:
  cpu: "ARM Cortex-A72"
  memory: "4GB"
  storage: "32GB"
  power: "5V/3A"
  supported_formats: ["onnx", "tflite"]
  max_batch_size: 1
  max_model_size_mb: 50
  target_latency_ms: 100
  optimization_level: "balanced"
  quantization: true
  pruning: true

# Jetson Nano Configuration
jetson_nano:
  cpu: "ARM Cortex-A57"
  gpu: "NVIDIA Maxwell"
  memory: "4GB"
  storage: "16GB"
  power: "5V/4A"
  supported_formats: ["onnx", "tflite", "tensorrt"]
  max_batch_size: 4
  max_model_size_mb: 200
  target_latency_ms: 50
  optimization_level: "aggressive"
  quantization: true
  pruning: true
  tensorrt: true

# Jetson Xavier Configuration
jetson_xavier:
  cpu: "ARM Cortex-A78AE"
  gpu: "NVIDIA Volta"
  memory: "32GB"
  storage: "64GB"
  power: "19V/6.3A"
  supported_formats: ["onnx", "tflite", "tensorrt", "openvino"]
  max_batch_size: 8
  max_model_size_mb: 500
  target_latency_ms: 20
  optimization_level: "aggressive"
  quantization: true
  pruning: true
  tensorrt: true
  openvino: true

# Android Configuration
android:
  cpu: "ARM/ARM64"
  gpu: "Adreno/Mali"
  memory: "4-8GB"
  storage: "64-256GB"
  power: "Battery"
  supported_formats: ["tflite", "coreml"]
  max_batch_size: 1
  max_model_size_mb: 100
  target_latency_ms: 50
  optimization_level: "conservative"
  quantization: true
  pruning: false

# iOS Configuration
ios:
  cpu: "ARM64"
  gpu: "Apple GPU"
  memory: "4-8GB"
  storage: "64-512GB"
  power: "Battery"
  supported_formats: ["coreml"]
  max_batch_size: 1
  max_model_size_mb: 100
  target_latency_ms: 30
  optimization_level: "conservative"
  quantization: true
  pruning: false

# MCU Configuration
mcu:
  cpu: "ARM Cortex-M"
  memory: "256KB-2MB"
  storage: "1-16MB"
  power: "3.3V/100mA"
  supported_formats: ["tflite"]
  max_batch_size: 1
  max_model_size_mb: 1
  target_latency_ms: 1000
  optimization_level: "extreme"
  quantization: true
  pruning: true
  distillation: true
